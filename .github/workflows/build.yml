name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Tests
        run: ./gradlew test

      - name: Upload WebFlux GraphiQL Screenshot
        uses: actions/upload-artifact@v7
        if: always()
        with:
          path: screenshots/webflux-graphiql.png
          archive: false

      - name: Upload WebFlux Voyager Screenshot
        uses: actions/upload-artifact@v7
        if: always()
        with:
          path: screenshots/webflux-voyager.png
          archive: false

      - name: Upload WebMvc GraphiQL Screenshot
        uses: actions/upload-artifact@v7
        if: always()
        with:
          path: screenshots/webmvc-graphiql.png
          archive: false

      - name: Upload WebMvc Voyager Screenshot
        uses: actions/upload-artifact@v7
        if: always()
        with:
          path: screenshots/webmvc-voyager.png
          archive: false