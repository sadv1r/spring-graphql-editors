name: Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Tests
        run: ./gradlew test

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Screenshots
          path: screenshots/*
